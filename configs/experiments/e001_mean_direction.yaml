name: e001_mean_direction
dataset: configs/data/latent_behavior_bench.yaml
model: configs/models/qwen35_2b.yaml
backend: fake
seed: 17
behaviors:
  - hallucination
  - sycophancy
  - premature_refusal
  - deception
  - unsafe_planning
  - overconfidence
