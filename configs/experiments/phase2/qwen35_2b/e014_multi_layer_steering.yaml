name: phase2_qwen35_2b_e014_multi_layer_steering
dataset: configs/data/latent_behavior_bench.yaml
model: configs/models/qwen35_2b.yaml
backend: qwen
seed: 17
behavior: sycophancy
origin: source_backed_contrasts
eval_bucket: external_clean
layers: [16, 17, 18, 19, 20]
activation_view: assistant_answer_mean
train_limit: 1000000
eval_limit: 1000000
groups:
  - name: single_18
    layers: [18]
    divide_alpha: false
  - name: window_17_19
    layers: [17, 18, 19]
    divide_alpha: true
  - name: window_16_20
    layers: [16, 17, 18, 19, 20]
    divide_alpha: true
alphas: [-2.0, 0.0, 2.0]
max_new_tokens: 32
generation_batch_size: 4
output_dir: runs/phase2_qwen35_2b
