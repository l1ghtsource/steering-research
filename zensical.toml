[project]
site_name = "PolicyIntegrityBench"
site_url = "https://l1ghtsource.github.io/steering-research/"
site_description = "Solver-backed evaluation of policy integrity under contextual pressure"
site_author = "PolicyIntegrityBench contributors"
repo_url = "https://github.com/l1ghtsource/steering-research"
repo_name = "l1ghtsource/steering-research"
edit_uri = "edit/main/docs/"
copyright = "PolicyIntegrityBench contributors"
docs_dir = "docs"
site_dir = "site"
nav = [
  { "Overview" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Dataset format" = "dataset.md" },
  { "Methodology" = "methodology.md" },
  { "Evaluation protocol" = "evaluation.md" },
  { "Validation" = "validation.md" },
  { "Research experiments" = "research.md" },
  { "CLI reference" = "cli.md" },
  { "Release status" = "release-status.md" },
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "content.code.select",
  "navigation.footer",
  "navigation.indexes",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
  "search.suggest",
]

[project.markdown_extensions]
admonition = {}
attr_list = {}
md_in_html = {}
tables = {}
toc = { permalink = true }

[project.markdown_extensions.pymdownx]
details = {}
highlight = { anchor_linenums = true }
inlinehilite = {}
superfences = {}
tabbed = { alternate_style = true }
